  Build-to-staging:
    runs-on: ubuntu-latest
    if: github.ref_name == 'nearlive'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
