name: Publish Docker TEMPLATE


on:
  workflow_call:
    inputs:
      # vault_path:
      #   description: 'Path to get ENV dev/data/oci-event '
      #   required: true
      #   type: string
      docker_tags:
        description: 'Docker Tags Image ocistok/procimart-mobile-v1:xxx'
        required: true
        type: string
      deploy_server:
        description: 'URL deployment update ACK'
        required: true
        type: string
      deployment_name:
        description: 'Deploymentnya e.g procimart, martkita'
        required: true
        type: string
      # url_root:
      #   description: 'aswaswasw'
      #   required: true
      #   type: string
    secrets:
      WEBHOOK_DINGTALK:
        required: false       
      # ROLEID:
      #   required: true
      # SECRETID:
      #   required: true
   
        

jobs:

  Build-and-deploy:
    runs-on: ubuntu-latest
    if: github.ref_name == 'development'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ocistok
          password: 5be4703b-5540-43f8-9862-ae677fee445b



      - name: Build and push Docker urushalal
        uses: docker/build-push-action@v2
        with:
          push: true
          no-cache: true
          tags: ${{ inputs.docker_tags }}
          file: ./Dockerfile


      - name: deploy to K8S server
        run: |
          curl ${{ inputs.deploy_server }}



## BOT DT
      - name: Notify dingtalk Deploy
        uses: leafney/dingtalk-action@v1
        if: always()
        env:
          DINGTALK_ACCESS_TOKEN: ${{ secrets.WEBHOOK_DINGTALK }}
        with:
          msgtype: text
          # notify_when: 'success'
          status: ${{ job.status }}
          text: |
            🔮 ${{ inputs.deployment_name }} ${{ job.status }} 🔮

            
            User: ${{ github.actor }} 
            created commit: ${{ github.ref_name }}
            Repository: ${{ github.repository }}
            Github Action URL : 
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Commit message: 
            ${{ github.event.head_commit.message }}


            url : https://urushalal.com
            

          at_mobiles: '+62-8886198345,+62-89668578211,+62-87877265170,+62-81357155067,+62-81392990231'
          title: urushalal FE Service Notification